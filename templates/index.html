<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Slide Maker</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>Fast Slide Maker Studio</h1>
    <p>PowerPoint-style deck workspace on the left, AI copilot on the right.</p>
  </header>

  <main class="workspace">
    <section class="ppt-shell">
      <aside class="slide-rail panel">
        <div class="rail-header">
          <h2>Slides</h2>
          <button id="generateBtn">Generate Deck</button>
        </div>
        <div id="slideTabs" class="slide-list"></div>
      </aside>

      <section class="editor-stage panel">
        <div class="stage-header">
          <h2>Canvas</h2>
          <div class="btns">
            <button id="regenerateBtn">Regenerate Slide</button>
            <button id="saveBtn">Save</button>
            <button id="loadBtn">Load</button>
            <button id="exportBtn">Export JSON</button>
          </div>
        </div>
        <article id="slidePreview" class="slide"></article>
        <section class="edit-form">
          <h3>Quick Slide Edit</h3>
          <label>Title <input id="titleEdit" /></label>
          <label>Objective <textarea id="objectiveEdit" rows="2"></textarea></label>
          <label>Summary <textarea id="summaryEdit" rows="3"></textarea></label>
          <label>Key Entities (comma-separated) <input id="entitiesEdit" /></label>
          <label>Relationships (one per line) <textarea id="relationshipsEdit" rows="3"></textarea></label>
          <button id="applyEditBtn">Apply Edits</button>
        </section>
      </section>
    </section>

    <aside class="copilot panel">
      <div class="tab-header">
        <button class="side-tab active" data-tab="chat">Chat</button>
        <button class="side-tab" data-tab="logs">Logs</button>
        <button class="side-tab" data-tab="settings">Settings</button>
      </div>

      <section id="tab-chat" class="tab-panel active">
        <h2>LLM Copilot</h2>
        <label>Prompt
          <textarea id="promptInput" rows="3">Create a 6-slide deck explaining the order-to-cash process and the target IT solution architecture.</textarea>
        </label>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-box">
          <textarea id="chatInput" rows="3" placeholder="Ask for narrative ideas, title rewrites, or process clarifications..."></textarea>
          <button id="sendChatBtn">Send</button>
        </div>
      </section>

      <section id="tab-logs" class="tab-panel">
        <h2>Exchange Log</h2>
        <p class="hint">Includes user messages and responses from LLM/app events.</p>
        <div id="logContainer" class="log-list"></div>
      </section>

      <section id="tab-settings" class="tab-panel">
        <h2>LLM Settings</h2>
        <label>Base URL <input id="baseUrlInput" value="http://localhost:11434" /></label>
        <label>Endpoint <input id="endpointInput" value="/api/chat" /></label>
        <label>Model <input id="modelInput" value="llama3" /></label>
        <label>Slide Count <input id="slideCountInput" type="number" min="3" max="20" value="6" /></label>
        <label>Temperature <input id="tempInput" type="number" min="0" max="1" step="0.1" value="0.2" /></label>
        <label>Max Tokens <input id="maxTokensInput" type="number" min="200" max="4000" value="1800" /></label>
        <label class="checkbox"><input id="mockInput" type="checkbox" /> Force Mock Mode</label>
        <button id="saveSettingsBtn">Save Settings</button>
        <p id="status" class="status">Ready.</p>
      </section>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
