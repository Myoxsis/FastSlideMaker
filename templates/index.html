<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Slide Maker — Semantic Preview</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>Semantic Slide Preview</h1>
          <p>Deterministic HTML rendering powered by semantic JSON.</p>
        </div>
        <div class="header-controls">
          <input id="project-name" type="text" placeholder="Project name" />
          <button id="save-deck" type="button">Save Project</button>
          <button id="export-json" type="button">Export JSON</button>
          <button id="export-pptx" type="button">Export PPTX</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="deck-panel" aria-label="Slide list">
          <section class="prompt-panel">
            <h3>Prompt</h3>
            <textarea
              id="prompt-input"
              rows="8"
              placeholder="Enter the source prompt for this deck..."
              aria-label="Current generation prompt"
            ></textarea>
            <small id="prompt-updated-at" class="muted"></small>
            <div class="prompt-actions">
              <button id="update-prompt" type="button">Update prompt</button>
              <button id="regenerate-deck" type="button">Regenerate deck</button>
              <button id="regenerate-slide" type="button">Regenerate selected slide</button>
            </div>
          </section>
          <h2>Deck</h2>
          <div class="project-gallery">
            <h3>Project Gallery</h3>
            <ul id="project-gallery-list"></ul>
          </div>
          <ul id="deck-list"></ul>
        </aside>

        <section class="slide-panel">
          <div class="slide-toolbar">
            <div>
              <span class="muted">Selected slide</span>
              <h2 id="slide-title-label"></h2>
            </div>
          </div>
          <article id="slide-preview" class="slide-preview" aria-live="polite"></article>
        </section>
      </section>

      <section class="json-panel">
        <h2>Semantic JSON (source of truth)</h2>
        <pre id="json-output"></pre>
      </section>
    </main>

    <script src="/static/js/app.js"></script>
  </body>
</html>
