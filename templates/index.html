<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Slide Maker</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <main>
      <h1>Fast Slide Maker</h1>
      <p>Generate structured slide decks with Ollama-backed or mock mode output.</p>

      <form id="deck-form">
        <label for="topic">Topic</label>
        <input id="topic" name="topic" placeholder="Quarterly business review" required />

        <label for="audience">Audience</label>
        <input id="audience" name="audience" value="Leadership team" />

        <label for="tone">Tone</label>
        <select id="tone" name="tone">
          <option>Professional</option>
          <option>Educational</option>
          <option>Persuasive</option>
        </select>

        <label for="slide_count">Slide count</label>
        <input id="slide_count" name="slide_count" type="number" min="3" max="30" value="6" />

        <button type="submit">Generate Deck</button>
      </form>

      <h2>Response</h2>
      <pre id="output">Submit the form to generate a deck.</pre>
    </main>

    <script src="/static/js/app.js"></script>
  </body>
</html>
